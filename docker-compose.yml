services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  web:
    build: .
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    depends_on:
      - redis
    volumes:
      - .:/app

  worker:
    build: .
    # Appended --pool=solo to prevent PyTorch fork deadlocks
    command: celery -A worker worker --loglevel=info --pool=solo
    environment:
      - OMP_NUM_THREADS=2
      - MKL_NUM_THREADS=2
      - OPENBLAS_NUM_THREADS=2 # Added for NumPy/SciPy thread control
    depends_on:
      - redis
    volumes:
      - .:/app